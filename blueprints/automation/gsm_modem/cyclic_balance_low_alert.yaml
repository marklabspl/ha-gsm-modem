blueprint:
  name: GSM Modem - Cyclic Balance Check and Low Alert
  description: Periodically run check_balance, parse numeric value from USSD response and alert when below threshold.
  domain: automation
  input:
    schedule:
      name: Schedule
      description: When balance check should run.
      selector:
        trigger:
    low_threshold:
      name: Low balance threshold
      description: Alert is sent when parsed balance is less than or equal to this value.
      default: 10
      selector:
        number:
          min: 0
          max: 9999
          step: 0.1
          mode: box
    regex_pattern:
      name: Regex pattern with first numeric match
      description: Example default matches 12.34 or 12,34.
      default: "([0-9]+(?:[\\.,][0-9]+)?)"
      selector:
        text:
    alert_number:
      name: Alert recipient number
      selector:
        text:
    alert_message:
      name: Alert SMS template
      default: "Niskie saldo: {{ balance_value }}. Odpowiedz operatora: {{ ussd_response }}"
      selector:
        text:
          multiline: true
    config_entry_id:
      name: Optional modem config entry id
      default: ""
      selector:
        text:

mode: single

trigger: !input schedule

variables:
  threshold: !input low_threshold
  regex_pattern: !input regex_pattern
  config_entry_id: !input config_entry_id

action:
  - choose:
      - conditions: "{{ config_entry_id | trim != '' }}"
        sequence:
          - action: gsm_modem.check_balance
            data:
              config_entry_id: !input config_entry_id
    default:
      - action: gsm_modem.check_balance
  - wait_for_trigger:
      - platform: event
        event_type: gsm_modem_ussd_response
    timeout: "00:00:45"
    continue_on_timeout: false
  - variables:
      ussd_response: "{{ wait.trigger.event.data.response | default('') }}"
      matched: "{{ ussd_response | regex_findall_index(regex_pattern, 0) | default('', true) }}"
      balance_value: "{{ matched | replace(',', '.') | float(-1) }}"
  - condition: template
    value_template: "{{ balance_value >= 0 and balance_value <= (threshold | float) }}"
  - choose:
      - conditions: "{{ config_entry_id | trim != '' }}"
        sequence:
          - action: gsm_modem.send_sms
            data:
              config_entry_id: !input config_entry_id
              number: !input alert_number
              message: !input alert_message
    default:
      - action: gsm_modem.send_sms
        data:
          number: !input alert_number
          message: !input alert_message
