send_sms:
  name: Send SMS
  description: Send an SMS message through the configured GSM modem.
  fields:
    config_entry_id:
      name: Config entry
      description: Modem config entry id. Required when more than one GSM modem is configured.
      required: false
      selector:
        config_entry:
          integration: gsm_modem
    device_id:
      name: Device
      description: GSM modem device id. Alternative to config_entry_id.
      required: false
      selector:
        device: {}
    number:
      name: Phone number
      description: Recipient phone number, for example +48700111222.
      required: true
      selector:
        text:
    message:
      name: Message
      description: SMS message body.
      required: true
      selector:
        text:
          multiline: true

send_test_sms:
  name: Send test SMS
  description: Send the configured test message to the configured test number. If no test number is set, the first authorized number is used.
  fields:
    config_entry_id:
      name: Config entry
      description: Modem config entry id. Required when more than one GSM modem is configured.
      required: false
      selector:
        config_entry:
          integration: gsm_modem
    device_id:
      name: Device
      description: GSM modem device id. Alternative to config_entry_id.
      required: false
      selector:
        device: {}

read_sms:
  name: Read SMS
  description: Read SMS messages from the modem and publish them as a Home Assistant event.
  fields:
    config_entry_id:
      name: Config entry
      description: Modem config entry id. Required when more than one GSM modem is configured.
      required: false
      selector:
        config_entry:
          integration: gsm_modem
    device_id:
      name: Device
      description: GSM modem device id. Alternative to config_entry_id.
      required: false
      selector:
        device: {}
    box:
      name: Mailbox
      description: SMS mailbox to read. Common values are ALL, REC UNREAD and REC READ.
      required: false
      default: ALL
      selector:
        select:
          translation_key: sms_box
          options:
            - ALL
            - REC UNREAD
            - REC READ

delete_sms:
  name: Delete SMS
  description: Delete an SMS message from the modem by its storage index.
  fields:
    config_entry_id:
      name: Config entry
      description: Modem config entry id. Required when more than one GSM modem is configured.
      required: false
      selector:
        config_entry:
          integration: gsm_modem
    device_id:
      name: Device
      description: GSM modem device id. Alternative to config_entry_id.
      required: false
      selector:
        device: {}
    index:
      name: SMS index
      description: Message index reported by the modem.
      required: true
      selector:
        number:
          min: 0
          max: 999
          mode: box

run_diagnostics:
  name: Run diagnostics
  description: Check AT communication, SIM state, signal, registration, operator, SMS text mode and SMS storage. The result is published as a Home Assistant event.
  fields:
    config_entry_id:
      name: Config entry
      description: Modem config entry id. Required when more than one GSM modem is configured.
      required: false
      selector:
        config_entry:
          integration: gsm_modem
    device_id:
      name: Device
      description: GSM modem device id. Alternative to config_entry_id.
      required: false
      selector:
        device: {}

